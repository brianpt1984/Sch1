    var dnum=c-lead+1;
    if(dnum<1 || dnum>last.getDate()){ h+='<div class="cts-day cts-out"></div>'; continue; }
    var dateIso=y+"-"+pad2(mo)+"-"+pad2(dnum);
    h+='<div class="cts-day"><div class="cts-dnum"><span class="'+(dateIso===todayIso?"cts-today":"")+'">'+dnum+'</span></div>';
    var items=assignmentsForDate(dateIso);
    if(items){
      items.forEach(function(it){
        var a=it.a, t=it.task;
        var sh=a.shift?'<span class="cts-mshift">'+shiftLabel(a.shift).charAt(0)+(a.shift==="MID"?"M":"")+'</span> ':"";
        if(!a.empId){ h+='<span class="cts-mini cts-mgap">'+sh+'UNFILLED <span class="cts-mtask">\u00B7 '+esc(t.name)+'</span></span>'; return; }
        var e=empById(a.empId); if(!e) return;
        if(a.role){
          h+='<span class="cts-mini" style="border-left-color:'+(a.role==="trainer"?"var(--cts-blue)":"var(--cts-amber)")+'" title="'
           +esc(t.name)+' \u2014 '+esc(e.name)+' ('+a.role+')">'+esc(e.name.split(" ")[0])
           +' <span class="cts-mtask">\u00B7 '+esc(t.name)+' ('+a.role+')</span></span>';
          return;
        }
        h+='<span class="cts-mini'+(a.training?" cts-mtrain":"")+'" title="'+esc(t.name)+' \u2014 '+esc(e.name)
         +(a.shift?' ('+shiftLabel(a.shift)+')':"")+(a.training?" (training)":"")+'">'
         +sh+esc(e.name.split(" ")[0])+' <span class="cts-mtask">\u00B7 '+esc(t.name)+'</span></span>';
      });
    }
    S.employees.forEach(function(e){
      var ty=isAbsent(e.id,dateIso);
      if(ty) h+='<span class="cts-mini cts-mabs" title="'+esc(e.name)+' \u2014 '+ABS_TYPES[ty]+'">'+esc(e.name.split(" ")[0])+' \u00B7 '+ABS_TYPES[ty].toLowerCase()+'</span>';
    });
    h+='</div>';
  }
  h+='</div></div>';
  h+='<div class="cts-note">Month view is read-only and merges every week it knows about (current schedule + archived + imported). Days with nothing shown have no schedule stored. Switch to Week view to generate or edit.</div>';
  v.innerHTML=h;
  bindSeg();
  function shiftMonth(n){
    var yy=+viewMonth.split("-")[0], mm=+viewMonth.split("-")[1]-1+n;
    var d=new Date(yy,mm,1); viewMonth=d.getFullYear()+"-"+pad2(d.getMonth()+1); renderBoardMonth();
  }
  document.getElementById("cts-mprev").addEventListener("click",function(){ shiftMonth(-1); });
  document.getElementById("cts-mnext").addEventListener("click",function(){ shiftMonth(1); });
  document.getElementById("cts-mpick").addEventListener("change",function(){
    if(this.value){ viewMonth=this.value; renderBoardMonth(); } });
}

/* ---------- week grid: BY POSITION (rows = positions) ---------- */
function gridByPosition(sc){
  var h='<div class="cts-boardwrap"><table class="cts-board"><thead><tr><th>Position</th>';
  for(var d=0;d<sc.days;d++){
    h+='<th class="'+(d>4?"cts-wkendcol":"")+'">'+DAY_NAMES[d]+'<span class="cts-date">'+fmtShort(addDays(sc.weekStart,d))+'</span></th>';
  }
  h+='</tr></thead><tbody>';
  tasksByRank().forEach(function(t){
    h+='<tr><td class="cts-taskcell"><div class="cts-taskname"><span style="font-family:var(--cts-mono);font-size:10px;color:var(--cts-mut)">#'+(t.rank||'?')+'</span> '+esc(t.name)
     +(t.type==="we"?'<span class="cts-wetag">Weekend</span>':"")
     +(t.training?'<span class="cts-trtag">Training</span>':"")
     +(t.balance===false?'<span class="cts-baltag cts-offbal">Extra</span>':"")
     +(t.noEscalation?'<span class="cts-noesctag">no esc</span>':"")
     +(t.optional?'<span class="cts-baltag cts-offbal" style="border-style:dashed">Suggest</span>':"")+'</div>'
     +'<div class="cts-tasksub">'+(t.training
        ? ((t.training.sessions||[]).length+' training session(s) \u00B7 out of rotation')
        : 'min L'+t.minLevel+' \u00B7 '+(t.type==="we"?"Early + Late + Mid":t.slots+' slot'+(t.slots>1?"s":"")))+'</div></td>';
    var pwt=primaryWeekendTask();
    for(var d=0;d<sc.days;d++){
      if((d===5||d===6) && pwt && t.id!==pwt.id && !t.training){
        h+='<td><span class="cts-na" title="Covered by the weekend team (Early / Mid / Late)">weekend team</span></td>'; continue;
      }
      var active = t.training ? true : (t.type==="we" ? (d===5||d===6) : t.days.indexOf(d)>-1);
      if(!active){ h+='<td><span class="cts-na">\u2014</span></td>'; continue; }
      var cell=sc.cells[t.id+"_"+d]||[];
      h+='<td>';
      if(!cell.length) h+='<span class="cts-na">\u2014</span>';
      cell.forEach(function(a){
        var shiftTag=a.shift?'<span class="cts-shift">'+shiftLabel(a.shift)+'</span> ':"";
        if(!a.empId){
          if(a.optional){ h+='<span class="cts-na" title="Suggest position \u2014 skipped, no spare staff">'+(a.shift?shiftLabel(a.shift)+' ':'')+'no spare</span> '; }
          else { h+='<span class="cts-gap">'+(a.shift?shiftLabel(a.shift)+" ":"")+'UNFILLED</span> '; }
          return; }
        var e=empById(a.empId); if(!e){ h+='<span class="cts-gap">?</span>'; return; }
        if(a.role){
          h+='<span class="cts-chip cts-trainingcell">'+esc(e.name)
           +' <span class="cts-role cts-role-'+a.role+'">'+a.role+'</span></span>';
          return;
        }
        h+='<span class="cts-chip'+(a.training?" cts-training":"")+'">'+shiftTag+esc(e.name)+' '+pips(skillOf(e,t.id))
         +(a.training?' <span class="cts-tag">train</span>':"")+'</span>';
      });
      h+='</td>';
    }
    h+='</tr>';
  });
  h+='<tr class="cts-absrow"><td class="cts-taskcell"><div class="cts-taskname" style="font-size:12px;color:var(--cts-mut)">Out today</div></td>';
  for(var d2=0;d2<sc.days;d2++){
    var dateIso=addDays(sc.weekStart,d2), outs="";
    S.employees.forEach(function(e){
      var ty=isAbsent(e.id,dateIso);
      if(ty) outs+='<span class="cts-abschip cts-'+ty+'">'+esc(e.name.split(" ")[0])+' \u00B7 '+ABS_TYPES[ty].charAt(0)+'</span>';
    });
    h+='<td>'+(outs||'<span class="cts-na">\u2014</span>')+'</td>';
  }
  h+='</tr>';
  var workedDay={};
  Object.keys(sc.cells).forEach(function(k){
    var dd=+k.split("_")[1]; workedDay[dd]=workedDay[dd]||{};
    sc.cells[k].forEach(function(a){ if(a.empId) workedDay[dd][a.empId]=true; });
  });
  var workedAllP=buildWorkedDates();
  var prevWeP={};
  S.employees.forEach(function(e){
    var w=workedAllP[e.id]||{};
    prevWeP[e.id]=!!(w[addDays(sc.weekStart,-2)]||w[addDays(sc.weekStart,-1)]);
  });
  h+='<tr class="cts-absrow"><td class="cts-taskcell"><div class="cts-taskname" style="font-size:12px;color:var(--cts-mut)">Day off</div></td>';
  for(var d3=0;d3<sc.days;d3++){
    var dateIso3=addDays(sc.weekStart,d3), offs="";
    S.employees.forEach(function(e){
      if(isLeader(e)) return;
      if(isAbsent(e.id,dateIso3)) return;
      if(workedDay[d3] && workedDay[d3][e.id]) return;
      if(d3===5||d3===6){ offs+='<span class="cts-abschip" style="color:var(--cts-green)">'+esc(e.name.split(" ")[0])+'</span>'; }
      else if(prevWeP[e.id]){ offs+='<span class="cts-abschip" style="color:var(--cts-green)" title="Compensation after the worked weekend">'+esc(e.name.split(" ")[0])+' \u00B7 recup</span>'; }
    });
    h+='<td>'+(offs||'<span class="cts-na">\u2014</span>')+'</td>';
  }
  h+='</tr>';
  h+='<tr class="cts-absrow"><td class="cts-taskcell"><div class="cts-taskname" style="font-size:12px;color:var(--cts-amber)">\u26A0 No task <span style="font-weight:400;color:var(--cts-mut)">(assign manually)</span></div></td>';
  for(var d4=0;d4<sc.days;d4++){
    var dateIso4=addDays(sc.weekStart,d4), sup="";
    if(d4<5){
      S.employees.forEach(function(e){
        if(isLeader(e)) return;
        if(isAbsent(e.id,dateIso4)) return;
        if(workedDay[d4] && workedDay[d4][e.id]) return;
        if(prevWeP[e.id]) return;                        // those are recup days, shown above
        sup+='<span class="cts-abschip" style="color:var(--cts-amber);border-color:var(--cts-amber)">'+esc(e.name.split(" ")[0])+'</span>';
      });
    }
    h+='<td>'+(sup||'<span class="cts-na">\u2014</span>')+'</td>';
  }
  h+='</tr></tbody></table></div>';
  return h;
}

/* ---------- week grid: BY COLLABORATOR (rows = people, cells = their tasks) ---------- */
function gridByCollaborator(sc){
  var workedAllR=buildWorkedDates();
  var prevWeWorkedR={};
  S.employees.forEach(function(e){
    var w=workedAllR[e.id]||{};
    prevWeWorkedR[e.id]=!!(w[addDays(sc.weekStart,-2)]||w[addDays(sc.weekStart,-1)]);
  });
  // reverse map: day -> empId -> [{t, a}]
  var byEmp={};
  Object.keys(sc.cells).forEach(function(k){
    var p=k.split("_"), t=taskById(p[0]), d=+p[1];
    if(!t) return;
    sc.cells[k].forEach(function(a){
      if(!a.empId) return;
      byEmp[a.empId]=byEmp[a.empId]||{};
      byEmp[a.empId][d]=byEmp[a.empId][d]||[];
      byEmp[a.empId][d].push({t:t, a:a});
    });
  });
  var rows=S.employees.filter(function(e){ return !isLeader(e) || byEmp[e.id]; });
  var h='<div class="cts-boardwrap"><table class="cts-board"><thead><tr><th>Collaborator</th>';
  for(var d=0;d<sc.days;d++){
    h+='<th class="'+(d>4?"cts-wkendcol":"")+'">'+DAY_NAMES[d]+'<span class="cts-date">'+fmtShort(addDays(sc.weekStart,d))+'</span></th>';
  }
  h+='</tr></thead><tbody>';
  rows.forEach(function(e){
    var weekN=(sc.counts&&sc.counts[e.id])||0;
    h+='<tr><td class="cts-taskcell"><div class="cts-taskname" style="white-space:nowrap">'+avatar(e,22)+' '+esc(e.name)+roleTag(e)+'</div>'
     +'<div class="cts-tasksub">'+weekN+' weekday assignment'+(weekN===1?"":"s")
     +((sc.weCounts&&sc.weCounts[e.id])?' \u00B7 weekend':"")+'</div></td>';
    for(var d=0;d<sc.days;d++){
      var dateIso=addDays(sc.weekStart,d);
      var ty=isAbsent(e.id,dateIso);
      var items=(byEmp[e.id]&&byEmp[e.id][d])||[];
      h+='<td>';
      if(items.length){
        items.forEach(function(it){
          var t=it.t, a=it.a;
          var shiftTag=a.shift?'<span class="cts-shift">'+shiftLabel(a.shift)+'</span> ':"";
          if(a.role){
            h+='<span class="cts-chip cts-trainingcell">'+esc(t.name)
             +' <span class="cts-role cts-role-'+a.role+'">'+a.role+'</span></span>';
          } else {
            h+='<span class="cts-chip'+(a.training?" cts-training":"")+'" title="'+esc(t.name)+' \u2014 level '+skillOf(e,t.id)+'/4">'
             +shiftTag+esc(t.name)+' '+pips(skillOf(e,t.id))
             +(a.training?' <span class="cts-tag">train</span>':"")+'</span>';
          }
        });
      } else if(ty){
        h+='<span class="cts-abschip cts-'+ty+'">'+ABS_TYPES[ty]+'</span>';
      } else if(isLeader(e)){
        h+='<span class="cts-na">\u2014</span>';
      } else if(d===5||d===6){
        h+='<span class="cts-abschip" style="color:var(--cts-green)">off</span>';   // weekend not worked = THE days off
      } else if(prevWeWorkedR[e.id]){
        h+='<span class="cts-abschip" style="color:var(--cts-green)" title="Compensation after the worked weekend">off \u00B7 recup</span>';
      } else {
        h+='<span class="cts-abschip" style="color:var(--cts-amber);border-color:var(--cts-amber)" title="No task assigned \u2014 give a manual position (weekday days off exist ONLY after a worked weekend)">\u26A0 no task</span>';
      }
      h+='</td>';
    }
    h+='</tr>';
  });
  // unstaffed strip: gaps belong to nobody, keep them visible
  if(sc.redist && sc.redist.length){
    h+='<div class="cts-note">\u21C4 '+sc.redist.length+' redistribution(s) so priority positions could be staffed: '
     +sc.redist.map(function(r){ return esc(r.moved)+" moved "+esc(r.from)+" \u2192 "+esc(r.to)+" on "+DAY_NAMES[r.day]+" (freed slot taken by "+esc(r.freed)+")"; }).join("; ")+'</div>';
  }
  var cg=coreGaps(sc), og=optGaps(sc);
  if(cg.length||og.length){
    h+='<tr class="cts-absrow"><td class="cts-taskcell"><div class="cts-taskname" style="font-size:12px;color:var(--cts-mut)">Unstaffed</div></td>';
    for(var d4=0;d4<sc.days;d4++){
      var cell="";
      cg.forEach(function(g){ if(g.day===d4) cell+='<span class="cts-gap">'+esc(g.task)+(g.shift?' '+shiftLabel(g.shift):"")+'</span> '; });
      og.forEach(function(g){ if(g.day===d4) cell+='<span class="cts-na" title="Suggest position skipped \u2014 no spare staff">'+esc(g.task)+(g.shift?' '+shiftLabel(g.shift):"")+' (no spare)</span> '; });
      h+='<td>'+(cell||'<span class="cts-na">\u2014</span>')+'</td>';
    }
    h+='</tr>';
  }
  h+='</tbody></table></div>';
  return h;
}

function renderBoardWeek(){
  var v=document.getElementById("cts-view-board");
  var h='<div class="cts-toolbar">'+segHtml();
  // week selector: current + archive
  h+='<select id="cts-weeksel"><option value="-1"'+(viewWeek===-1?" selected":"")+'>Current'
   +(S.schedule?' \u2014 '+fmtShort(S.schedule.weekStart):"")+'</option>';
  S.archive.forEach(function(a,i){
    h+='<option value="'+i+'"'+(viewWeek===i?" selected":"")+'>Week of '+esc(a.weekStart)+' ('+esc(a.source)+')</option>';
  });
  h+='</select>';
  if(admin && viewWeek===-1){
    h+='<label style="font-size:12px;color:var(--cts-mut)">Week of</label>'
     +'<input type="date" id="cts-weekstart" value="'+esc(S.weekStart)+'">'
     +'<button class="cts-btn cts-btn-primary" id="cts-gen">Generate schedule</button>'
     +'<button class="cts-btn" id="cts-gen3" title="Generates 13 consecutive weeks starting from the week above. Locked once generated.">Generate 3 months</button>'
     +'<button class="cts-btn cts-btn-sm" id="cts-adv" title="Archive the current week and load the next generated week">Advance week \u2192</button>';
  }
  var sc=currentView();
  h+='<span class="cts-seg"><button id="cts-segbyc" class="'+(boardBy==="collab"?"cts-sel":"")+'">By collaborator</button>'
   +'<button id="cts-segbyp" class="'+(boardBy==="pos"?"cts-sel":"")+'">By position</button></span>';
  h+='<span class="cts-weeklabel">'+(sc? "Week "+fmtShort(sc.weekStart)+" \u2192 "+fmtShort(addDays(sc.weekStart,sc.days-1)) : "No schedule yet")+'</span>';
  if(viewWeek!==-1) h+='<span class="cts-archnote">ARCHIVED \u2014 read-only</span>';
  h+='</div>';

  if(!sc){
    h+='<div class="cts-empty">No schedule generated for this week yet.'+(admin?' Set the week and click <b>Generate schedule</b>.':' Ask an admin to generate one.')+'</div>';
    v.innerHTML=h; bindBoard(); return;
  }
  if(viewWeek===-1 && sc.structHash && sc.structHash!==structHash()){
    h+='<div class="cts-banner cts-banner-warn"
