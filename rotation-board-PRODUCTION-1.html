  var prompt="You are the analyst for a team scheduling board (financial operations control tower). "
    +"Answer the question using ONLY the data below. Be concise and concrete; use names, dates and counts. "
    +"If the data does not contain the answer, say so.\n\n=== BOARD DATA ===\n"+buildContext()
    +"\n=== QUESTION ===\n"+question;
  convo.push({role:"user",content:prompt});
  return fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:headers,
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:convo})
  }).then(function(r){ return r.json().then(function(j){ return {ok:r.ok,j:j}; }); })
  .then(function(res){
    if(!res.ok) throw new Error((res.j&&res.j.error&&res.j.error.message)||"API error");
    return (res.j.content||[]).filter(function(b){return b.type==="text";})
      .map(function(b){return b.text;}).join("\n").trim() || "(empty reply)";
  });
}

/* ---------- views ---------- */
function pendingCount(){ return S.requests.filter(function(r){return r.status==="pending"||r.status==="alt";}).length; }
function render(){
  document.querySelectorAll("#cts-tabs .cts-tab").forEach(function(b){
    b.classList.toggle("cts-active", b.getAttribute("data-cts-tab")===activeTab);
  });
  var dot=document.getElementById("cts-reqdot");
  var pc=pendingCount();
  dot.innerHTML = pc? '<span class="cts-dot">'+pc+'</span>' : "";
  ["board","team","tasks","merge","abs","req","rules","ai","data"].forEach(function(v){
    document.getElementById("cts-view-"+v).classList.toggle("cts-hide", v!==activeTab);
  });
  if(activeTab==="board") renderBoard();
  if(activeTab==="team") renderTeam();
  if(activeTab==="tasks") renderTasks();
  if(activeTab==="merge") renderMerge();
  if(activeTab==="abs") renderAbs();
  if(activeTab==="req") renderReq();
  if(activeTab==="rules") renderRules();
  if(activeTab==="ai") renderAI();
  if(activeTab==="data") renderData();
}

function currentView(){
  if(viewWeek===-1) return S.schedule;
  return S.archive[viewWeek]||null;
}
function renderBoard(){
  if(boardMode==="month") renderBoardMonth(); else renderBoardWeek();
}
function segHtml(){
  return '<span class="cts-seg"><button id="cts-segw" class="'+(boardMode==="week"?"cts-sel":"")+'">Week</button>'
   +'<button id="cts-segm" class="'+(boardMode==="month"?"cts-sel":"")+'">Month</button></span>';
}
function bindSeg(){
  var w=document.getElementById("cts-segw"), m=document.getElementById("cts-segm");
  if(w) w.addEventListener("click",function(){ boardMode="week"; renderBoard(); });
  if(m) m.addEventListener("click",function(){ boardMode="month"; renderBoard(); });
}
function renderBoardMonth(){
  var v=document.getElementById("cts-view-board");
  var y=+viewMonth.split("-")[0], mo=+viewMonth.split("-")[1];
  var monthName=new Date(y,mo-1,1).toLocaleString("en",{month:"long"});
  var h='<div class="cts-toolbar">'+segHtml()
   +'<span class="cts-monthnav"><button class="cts-btn cts-btn-sm" id="cts-mprev">\u2190</button>'
   +'<span class="cts-mlabel">'+esc(monthName)+' '+y+'</span>'
   +'<button class="cts-btn cts-btn-sm" id="cts-mnext">\u2192</button></span>'
   +'<input type="month" id="cts-mpick" value="'+esc(viewMonth)+'" style="padding:4px 6px">'
   +'<span class="cts-weeklabel">week schedules assembled from current + archive</span></div>';

  var first=new Date(y,mo-1,1), last=new Date(y,mo,0);
  var lead=(first.getDay()+6)%7;                       // Monday-first offset
  var todayIso=iso(new Date());
  h+='<div class="cts-calwrap"><div class="cts-cal">';
  DAY_NAMES.forEach(function(dn,i){ h+='<div class="cts-dow'+(i>4?" cts-wkendcol":"")+'">'+dn+'</div>'; });
  var totalCells=Math.ceil((lead+last.getDate())/7)*7;
  for(var c=0;c<totalCells;c++){
    var dnum=c-lead+1;
    if(dnum<1 || dnum>last.getDate()){ h+='<div class="cts-day cts-out"></div>'; continue; }
    var dateIso=y+"-"+pad2(mo)+"-"+pad2(dnum);
    h+='<div class="cts-day"><div class="cts-dnum"><span class="'+(dateIso===todayIso?"cts-today":"")+'">'+dnum+'</span></div>';
    var items=assignmentsForDate(dateIso);
    if(items){
      items.forEach(function(it){
        var a=it.a, t=it.task;
        var sh=a.shift?'<span class="cts-mshift">'+shiftLabel(a.shift).charAt(0)+(a.shift==="MID"?"M":"")+'</span> ':"";
        if(!a.empId){ h+='<span class="cts-mini cts-mgap">'+sh+'UNFILLED <span class="cts-mtask">\u00B7 '+esc(t.name)+'</span></span>'; return; }
        var e=empById(a.empId); if(!e) return;
        if(a.role){
          h+='<span class="cts-mini" style="border-left-color:'+(a.role==="trainer"?"var(--cts-blue)":"var(--cts-amber)")+'" title="'
           +esc(t.name)+' \u2014 '+esc(e.name)+' ('+a.role+')">'+esc(e.name.split(" ")[0])
           +' <span class="cts-mtask">\u00B7 '+esc(t.name)+' ('+a.role+')</span></span>';
          return;
        }
        h+='<span class="cts-mini'+(a.training?" cts-mtrain":"")+'" title="'+esc(t.name)+' \u2014 '+esc(e.name)
         +(a.shift?' ('+shiftLabel(a.shift)+')':"")+(a.training?" (training)":"")+'">'
         +sh+esc(e.name.split(" ")[0])+' <span class="cts-mtask">\u00B7 '+esc(t.name)+'</span></span>';
      });
    }
    S.employees.forEach(function(e){
      var ty=isAbsent(e.id,dateIso);
      if(ty) h+='<span class="cts-mini cts-mabs" title="'+esc(e.name)+' \u2014 '+ABS_TYPES[ty]+'">'+esc(e.name.split(" ")[0])+' \u00B7 '+ABS_TYPES[ty].toLowerCase()+'</span>';
    });
    h+='</div>';
  }
  h+='</div></div>';
  h+='<div class="cts-note">Month view is read-only and merges every week it knows about (current schedule + archived + imported). Days with nothing shown have no schedule stored. Switch to Week view to generate or edit.</div>';
  v.innerHTML=h;
  bindSeg();
  function shiftMonth(n){
    var yy=+viewMonth.split("-")[0], mm=+viewMonth.split("-")[1]-1+n;
    var d=new Date(yy,mm,1); viewMonth=d.getFullYear()+"-"+pad2(d.getMonth()+1); renderBoardMonth();
  }
  document.getElementById("cts-mprev").addEventListener("click",function(){ shiftMonth(-1); });
  document.getElementById("cts-mnext").addEventListener("click",function(){ shiftMonth(1); });
  document.getElementById("cts-mpick").addEventListener("change",function(){
    if(this.value){ viewMonth=this.value; renderBoardMonth(); } });
}

/* ---------- week grid: BY POSITION (rows = positions) ---------- */
function gridByPosition(sc){
  var h='<div class="cts-boardwrap"><table class="cts-board"><thead><tr><th>Position</th>';
  for(var d=0;d<sc.days;d++){
    h+='<th class="'+(d>4?"cts-wkendcol":"")+'">'+DAY_NAMES[d]+'<span class="cts-date">'+fmtShort(addDays(sc.weekStart,d))+'</span></th>';
  }
  h+='</tr></thead><tbody>';
  // the weekend rows must show the trio that was ACTUALLY generated: pick the
  // weekend task that has Sat/Sun cells in THIS schedule; fall back to the
  // structural primary (and hint to adapt) when the structure drifted.
  var pwtTop=primaryWeekendTask();
  var schedWe=null;
  tasksByRank().forEach(function(tw){
    if(schedWe || tw.type!=="we" || tw.training) return;
    if((sc.cells[tw.id+"_5"]||[]).length || (sc.cells[tw.id+"_6"]||[]).length) schedWe=tw;
  });
  var weRowTask=schedWe||pwtTop;
  var weDrift=!!(pwtTop && schedWe && schedWe.id!==pwtTop.id);
  tasksByRank().forEach(function(t){
    // THE weekend unit renders as three dedicated rows — Early / Mid / Late —
    // each shift on its own line, its holder shown on Saturday and Sunday.
    if(weRowTask && t.id===weRowTask.id && !t.training){
      var order=[{k:"S1",label:"Early"},{k:"MID",label:"Mid"},{k:"S2",label:"Late"}];
      order.forEach(function(sh,si){
        h+='<tr><td class="cts-taskcell"><div class="cts-taskname">'
         +(si===0?'<span style="font-family:var(--cts-mono);font-size:10px;color:var(--cts-mut)">#'+(t.rank||'?')+'</span> '+esc(t.name)+' <span class="cts-wetag">Weekend</span><br>':"")
         +'<span class="cts-shift">'+sh.label+'</span></div>'
         +(si===0?'<div class="cts-tasksub">min L'+t.minLevel+' \u00B7 same trio Sat + Sun \u00B7 covers all positions'+(weDrift?' <span class="cts-noesctag">structure changed \u2014 adapt to move the trio here</span>':'')+'</div>':"")+'</td>';
        for(var d=0;d<sc.days;d++){
          if(d<5){ h+='<td><span class="cts-na">\u2014</span></td>'; continue; }
          var raw=sc.cells[t.id+"_"+d]||[];
          var cell=raw.filter(function(a){ return (a.shift||null)===sh.k; });
          if(!cell.length && si===0){
            // legacy or drifted entries without shift markers: never hide an
            // attributed person — show them on the first row, shift-agnostic
            cell=raw.filter(function(a){ return a.empId && !a.shift; });
          }
          h+='<td>';
          if(!cell.length) h+='<span class="cts-gap" title="No one attributed to this shift in the stored schedule \u2014 regenerate or adapt the structure">UNFILLED</span>';
          cell.forEach(function(a){
            if(!a.empId){ h+='<span class="cts-gap">UNFILLED</span> '; return; }
            var e=empById(a.empId); if(!e){ h+='<span class="cts-gap">?</span>'; return; }
            h+='<span class="cts-chip'+(a.training?" cts-training":"")+'">'+esc(e.name)+' '+pips(skillOf(e,t.id))
             +(a.training?' <span class="cts-tag">train</span>':"")+'</span>';
          });
          h+='</td>';
        }
        h+='</tr>';
      });
      return;
    }
    h+='<tr><td class="cts-taskcell"><div class="cts-taskname"><span style="font-family:var(--cts-mono);font-size:10px;color:var(--cts-mut)">#'+(t.rank||'?')+'</span> '+esc(t.name)
     +(t.type==="we"?'<span class="cts-wetag">Weekend</span>':"")
     +(t.training?'<span class="cts-trtag">Training</span>':"")
     +(t.balance===false?'<span class="cts-baltag cts-offbal">Extra</span>':"")
     +(t.noEscalation?'<span class="cts-noesctag">no esc</span>':"")
     +(t.optional?'<span class="cts-baltag cts-offbal" style="border-style:dashed">Suggest</span>':"")+'</div>'
     +'<div class="cts-tasksub">'+(t.training
        ? ((t.training.sessions||[]).length+' training session(s) \u00B7 out of rotation')
        : 'min L'+t.minLevel+' \u00B7 '+(t.type==="we"?"Early + Late + Mid":t.slots+' slot'+(t.slots>1?"s":"")))+'</div></td>';
    for(var d=0;d<sc.days;d++){
      if((d===5||d===6) && weRowTask && t.id!==weRowTask.id && !t.training){
        h+='<td><span class="cts-na" title="Covered by the weekend team (Early / Mid / Late)">weekend team</span></td>'; continue;
      }
      var active = t.training ? true : (t.type==="we" ? (d===5||d===6) : t.days.indexOf(d)>-1);
      if(!active){ h+='<td><span class="cts-na">\u2014</span></td>'; continue; }
      var cell=sc.cells[t.id+"_"+d]||[];
      h+='<td>';
      if(!cell.length) h+='<span class="cts-na">\u2014</span>';
      cell.forEach(function(a){
        var shiftTag=a.shift?'<span class="cts-shift">'+shiftLabel(a.shift)+'</span> ':"";
        if(!a.empId){
          if(a.optional){ h+='<span class="cts-na" title="Suggest position \u2014 skipped, no spare staff">'+(a.shift?shiftLabel(a.shift)+' ':'')+'no spare</span> '; }
          else { h+='<span class="cts-gap">'+(a.shift?shiftLabel(a.shift)+" ":"")+'UNFILLED</span> '; }
          return; }
        var e=empById(a.empId); if(!e){ h+='<span class="cts-gap">?</span>'; return; }
        if(a.mergedFrom){
          var ms=taskById(a.mergedFrom);
          var combo=(ms?ms.name:"?")+"+"+t.name;
          h+='<span class="cts-chip" style="border-style:dashed" title="Two positions became one today: '+esc(combo)+' \u2014 held by '+esc(e.name)+'">'
           +(a.shift?'<span class="cts-shift">'+shiftLabel(a.shift)+'</span> ':"")
           +esc(combo)+' \u00B7 '+esc(e.name)+' <span class="cts-tag">\u21C4</span></span>';
          return;
        }
        if(a.mergedWith){
          var md=taskById(a.mergedWith);
          var combo2=t.name+"+"+(md?md.name:"?");
          h+='<span class="cts-chip" style="border-style:dashed" title="Two positions became one today: '+esc(combo2)+' \u2014 held by '+esc(e.name)+'">'
           +(a.shift?'<span class="cts-shift">'+shiftLabel(a.shift)+'</span> ':"")
           +esc(combo2)+' \u00B7 '+esc(e.name)+' <span class="cts-tag">\u21C4</span></span>';
          return;
        }
        if(a.transformedName){
          h+='<span class="cts-chip" style="border-style:dashed" title="Task redistribution after a merge \u2014 this position runs as '+esc(a.transformedName)+' today; workload still counts to the original position">'
           +(a.shift?'<span class="cts-shift">'+shiftLabel(a.shift)+'</span> ':"")
           +esc(e.name)+' <span class="cts-tag">\u2192 '+esc(a.transformedName)+'</span></span>';
          return;
        }
        if(a.role){
          h+='<span class="cts-chip cts-trainingcell">'+esc(e.name)
           +' <span class="cts-role cts-role-'+a.role+'">'+a.role+'</span></span>';
          return;
        }
        h+='<span class="cts-chip'+(a.training?" cts-training":"")+'">'+shiftTag+esc(e.name)+' '+pips(skillOf(e,t.id))
         +(a.training?' <span class="cts-tag">train</span>':"")+(a.manual?' <span class="cts-tag" title="Manually set">M</span>':"")+'</span>';
      });
      h+='</td>';
    }
    h+='</tr>';
  });
  h+='<tr class="cts-absrow"><td class="cts-taskcell"><div class="cts-taskname" style="font-size:12px;color:var(--cts-mut)">Out today</div></td>';
  for(var d2=0;d2<sc.days;d2++){
    var dateIso=addDays(sc.weekStart,d2), outs="";
    S.employees.forEach(function(e){
      var ty=isAbsent(e.id,dateIso);
      if(ty) outs+='<span class="cts-abschip cts-'+ty+'">'+esc(e.name.split(" ")[0])+' \u00B7 '+ABS_TYPES[ty].charAt(0)+'</span>';
    });
    h+='<td>'+(outs||'<span class="cts-na">\u2014</span>')+'</td>';
  }
  h+='</tr>';
  var workedDay={};
  Object.keys(sc.cells).forEach(function(k){
    var dd=+k.split("_")[1]; workedDay[dd]=workedDay[dd]||{};
    sc.cells[k].forEach(function(a){ if(a.empId) workedDay[dd][a.empId]=true; });
  });
  var workedAllP=buildWorkedDates();
  var prevWeP={};
  S.employees.forEach(function(e){
    var w=workedAllP[e.id]||{};
    prevWeP[e.id]=!!(w[addDays(sc.weekStart,-2)]||w[addDays(sc.weekStart,-1)]);
  });
  h+='<tr class="cts-absrow"><td class="cts-taskcell"><div class="cts-taskname" style="font-size:12px;color:var(--cts-mut)">Day off</div></td>';
  for(var d3=0;d3<sc.days;d3++){
    var dateIso3=addDays(sc.weekStart,d3), offs="";
    S.employees.forEach(function(e){
      if(isLeader(e)) return;
      if(isAbsent(e.id,dateIso3)) return;
      if(workedDay[d3] && workedDay[d3][e.id]) return;
      if(d3===5||d3===6){ offs+='<span class="cts-abschip" style="color:var(--cts-green)">'+esc(e.name.split(" ")[0])+'</span>'; }
      else if(prevWeP[e.id]){ offs+='<span class="cts-abschip" style="color:var(--cts-green)" title="Compensation after the worked weekend">'+esc(e.name.split(" ")[0])+' \u00B7 recup</span>'; }
    });
    h+='<td>'+(offs||'<span class="cts-na">\u2014</span>')+'</td>';
  }
  h+='</tr>';
  h+='<tr class="cts-absrow"><td class="cts-taskcell"><div class="cts-taskname" style="font-size:12px;color:var(--cts-amber)">\u26A0 No task <span style="font-weight:400;color:var(--cts-mut)">(assign manually)</span></div></td>';
  for(var d4=0;d4<sc.days;d4++){
    var dateIso4=addDays(sc.weekStart,d4), sup="";
    if(d4<5){
      S.employees.forEach(function(e){
        if(isLeader(e)) return;
        if(isAbsent(e.id,dateIso4)) return;
        if(workedDay[d4] && workedDay[d4][e.id]) return;
        if(prevWeP[e.id]) return;                        // those are recup days, shown above
        sup+='<span class="cts-abschip" style="color:var(--cts-amber);border-color:var(--cts-amber)">'+esc(e.name.split(" ")[0])+'</span>';
      });
    }
    h+='<td>'+(sup||'<span class="cts-na">\u2014</span>')+'</td>';
  }
  h+='</tr></tbody></table></div>';
  return h;
}

/* ---------- week grid: BY COLLABORATOR (rows = people, cells = their tasks) ---------- */
function gridByCollaborator(sc){
  var workedAllR=buildWorkedDates();
  var prevWeWorkedR={};
  S.employees.forEach(function(e){
    var w=workedAllR[e.id]||{};
    prevWeWorkedR[e.id]=!!(w[addDays(sc.weekStart,-2)]||w[addDays(sc.weekStart,-1)]);
  });
  // reverse map: day -> empId -> [{t, a}]
  var byEmp={};
  Object.keys(sc.cells).forEach(function(k){
    var p=k.split("_"), t=taskById(p[0]), d=+p[1];
    if(!t) return;
    sc.cells[k].forEach(function(a){
      if(!a.empId) return;
      byEmp[a.empId]=byEmp[a.empId]||{};
      byEmp[a.empId][d]=byEmp[a.empId][d]||[];
      byEmp[a.empId][d].push({t:t, a:a});
    });
  });
  var rows=S.employees.filter(function(e){ return !isLeader(e) || byEmp[e.id]; });
  var h='<div class="cts-boardwrap"><table class="cts-board"><thead><tr><th>Collaborator</th>';
  for(var d=0;d<sc.days;d++){
    h+='<th class="'+(d>4?"cts-wkendcol":"")+'">'+DAY_NAMES[d]+'<span class="cts-date">'+fmtShort(addDays(sc.weekStart,d))+'</span></th>';
  }
  h+='</tr></thead><tbody>';
  rows.forEach(function(e){
    var weekN=(sc.counts&&sc.counts[e.id])||0;
    h+='<tr><td class="cts-taskcell"><div class="cts-taskname" style="white-space:nowrap">'+avatar(e,22)+' '+esc(e.name)+roleTag(e)+'</div>'
     +'<div class="cts-tasksub">'+weekN+' weekday assignment'+(weekN===1?"":"s")
     +((sc.weCounts&&sc.weCounts[e.id])?' \u00B7 weekend':"")+'</div></td>';
    for(var d=0;d<sc.days;d++){
      var dateIso=addDays(sc.weekStart,d);
      var ty=isAbsent(e.id,dateIso);
      var items=(byEmp[e.id]&&byEmp[e.id][d])||[];
      h+='<td>';
      if(items.length){
        items.forEach(function(it){
          var t=it.t, a=it.a;
          var shiftTag=a.shift?'<span class="cts-shift">'+shiftLabel(a.shift)+'</span> ':"";
          if(a.mergedFrom){
            // combined chip is rendered from the source side — skip the duplicate
          } else if(a.mergedWith){
            var mdw=taskById(a.mergedWith);
            var combo3=t.name+"+"+(mdw?mdw.name:"?");
            h+='<span class="cts-chip" style="border-style:dashed" title="Two positions became one today">'+esc(combo3)+' <span class="cts-tag">\u21C4</span></span>';
          } else if(a.transformedName){
            h+='<span class="cts-chip" style="border-style:dashed" title="'+esc(t.name)+' runs as '+esc(a.transformedName)+' today (task redistribution after a merge); balance counts to the original">'
             +esc(a.transformedName)+' <span class="cts-tag">\u2190 '+esc(t.name)+'</span></span>';
          } else if(a.role){
            h+='<span class="cts-chip cts-trainingcell">'+esc(t.name)
             +' <span class="cts-role cts-role-'+a.role+'">'+a.role+'</span></span>';
          } else {
            h+='<span class="cts-chip'+(a.training?" cts-training":"")+'" title="'+esc(t.name)+' \u2014 level '+skillOf(e,t.id)+'/4">'
             +shiftTag+esc(t.name)+' '+pips(skillOf(e,t.id))
             +(a.training?' <span class="cts-tag">train</span>':"")+(a.manual?' <span class="cts-tag" title="Manually set">M</span>':"")+'</span>';
          }
        });
      } else if(ty){
        h+='<span class="cts-abschip cts-'+ty+'">'+ABS_TYPES[ty]+'</span>';
      } else if(isLeader(e)){
        h+='<span class="cts-na">\u2014</span>';
      } else if(d===5||d===6){
        h+='<span class="cts-abschip" style="color:var(--cts-green)">off</span>';   // weekend not worked = THE days off
      } else if(prevWeWorkedR[e.id]){
        h+='<span class="cts-abschip" style="color:var(--cts-green)" title="Compensation after the worked weekend">off \u00B7 recup</span>';
      } else {
        h+='<span class="cts-abschip" style="color:var(--cts-amber);border-color:var(--cts-amber)" title="No task assigned \u2014 give a manual position (weekday days off exist ONLY after a worked weekend)">\u26A0 no task</span>';
      }
      h+='</td>';
    }
    h+='</tr>';
  });
  // unstaffed strip: gaps belong to nobody, keep them visible
  if(sc.merges && sc.merges.length){
    h+='<div class="cts-note">\u21C4 '+sc.merges.length+' merge(s) applied: '
     +sc.merges.map(function(m){ return esc(m.task)+" merged with "+esc(m.withTask)+" on "+DAY_NAMES[m.day]+" (held by "+esc(m.emp)+")"+(m.replaced?" \u2014 "+esc(m.replaced)+" runs as "+esc(m.as):""); }).join("; ")+'</div>';
  }
  if(sc.redist && sc.redist.length){
    h+='<div class="cts-note">\u21C4 '+sc.redist.length+' redistribution(s) so priority positions could be staffed: '
     +sc.redist.map(function(r){ return esc(r.moved)+" moved "+esc(r.from)+" \u2192 "+esc(r.to)+" on "+DAY_NAMES[r.day]+" (freed slot taken by "+esc(r.freed)+")"; }).join("; ")+'</div>';
  }
  var cg=coreGaps(sc), og=optGaps(sc);
  if(cg.length||og.length){

function manualEligibleNew(t, days, curEmpId){
  var sc=S.schedule, out=[];
  S.employees.forEach(function(e){
    if(e.id===curEmpId) return;
    if(skillOf(e,t.id)<2) return;                          // level 1: never, not even manually
    var absent=false, busyNames=[];
    days.forEach(function(dd){
      var dIso=addDays(sc.weekStart,dd);
      if(isAbsent(e.id,dIso)) absent=true;
      Object.keys(sc.cells).forEach(function(k2){
        var p2=k2.split("_");
        if(+p2[1]!==dd) return;
        sc.cells[k2].forEach(function(a){
          if(a.empId!==e.id) return;
          if(a.role){ absent=true; return; }               // training day: locked
          var t2=taskById(p2[0]);
          if(t2 && busyNames.indexOf(t2.name)===-1) busyNames.push(t2.name);
        });
      });
    });
    if(absent) return;
    out.push({e:e, busy:busyNames});
  });
  return out;
}
function manualApply(taskId, day, shift, curEmpId, newEmpId){
  var sc=S.schedule; if(!sc){ toast("No active schedule"); return false; }
  var t=taskById(taskId); if(!t){ toast("Pick a position"); return false; }
  var days = t.type==="we" ? [5,6] : [day];
  if(newEmpId && newEmpId!=="__remove__"){
    var ne=empById(newEmpId); if(!ne) return false;
    if(skillOf(ne,t.id)<2){ toast(ne.name+" is level 1 on "+t.name+" \u2014 cannot do this position at all"); return false; }
    var workedAll=buildWorkedDates();
    workedAll[newEmpId]=workedAll[newEmpId]||{};
    for(var i=0;i<days.length;i++){
      var dIso=addDays(sc.weekStart,days[i]);
      if(isAbsent(newEmpId,dIso)){ toast("Cannot apply: "+ne.name+" is absent on "+DAY_NAMES[days[i]]); return false; }
      if(!streakOK(workedAll,newEmpId,dIso)){ toast("Cannot apply: would exceed "+RULES().maxConsecutive+" consecutive days"); return false; }
    }
    if(prevWeekendWorked(workedAll,newEmpId,sc.weekStart)){
      var wk={}; Object.keys(sc.cells).forEach(function(k3){
        var d3=+k3.split("_")[1];
        sc.cells[k3].forEach(function(a){ if(a.empId===newEmpId) wk[d3]=1; });
      });
      if(Object.keys(wk).length+days.length>RULES().postWeekendCap){ toast("Cannot apply: worked last weekend \u2014 max "+RULES().postWeekendCap+" days this week"); return false; }
    }
  }
  if(newEmpId && newEmpId!=="__remove__"){
    // MOVE semantics: vacate any other assignment the person holds on those days.
    // The vacated slot becomes a visible UNFILLED so nothing disappears silently.
    days.forEach(function(dd){
      Object.keys(sc.cells).forEach(function(k4){
        var p4=k4.split("_");
        if(+p4[1]!==dd || p4[0]===taskId) return;
        sc.cells[k4].forEach(function(a){
          if(a.empId!==newEmpId || a.role) return;
          var t4=taskById(p4[0]);
          if(t4) bumpHist(newEmpId,t4.id,-1);
          a.empId=null; delete a.manual; delete a.training; delete a.transformedName; delete a.mergedFrom; delete a.mergedWith;
        });
      });
    });
  }
  days.forEach(function(dd){
    var key=taskId+"_"+dd; sc.cells[key]=sc.cells[key]||[];
    var arr=sc.cells[key], hit=null;
    for(var j=0;j<arr.length;j++){
      var a=arr[j];
      var shiftMatch = t.type==="we" ? (a.shift||null)===shift : true;
      var empMatch = curEmpId ? a.empId===curEmpId : !a.empId;
      if(shiftMatch && empMatch && !a.role){ hit=a; break; }
    }
    if(newEmpId==="__remove__"){
      if(hit && hit.empId){ bumpHist(hit.empId,t.id,-1); hit.empId=null; delete hit.manual; delete hit.training; delete hit.transformedName; delete hit.mergedFrom; delete hit.mergedWith; }
      return;
    }
    if(hit){
      if(hit.empId) bumpHist(hit.empId,t.id,-1);
      hit.empId=newEmpId; hit.manual=true;
      hit.training=skillOf(empById(newEmpId),t.id)<t.minLevel;
      delete hit.mergedFrom; delete hit.mergedWith; delete hit.transformedName;
    } else {
      arr.push({empId:newEmpId, shift:(t.type==="we"?shift:null), manual:true,
                training:skillOf(empById(newEmpId),t.id)<t.minLevel});
    }
    bumpHist(newEmpId,t.id,1);
  });
  recountWeek(sc);
  save();
  return true;
}
function bindManual(){
 try{
  var tSel=document.getElementById("cts-man-task");
  if(!tSel) return;
  var dSel=document.getElementById("cts-man-day"), shSel=document.getElementById("cts-man-shift"),
      cSel=document.getElementById("cts-man-cur"), nSel=document.getElementById("cts-man-new"),
      ap=document.getElementById("cts-man-apply");
  function refreshDays(){
    var t=taskById(tSel.value);
    var hh="";
    if(!t){ dSel.innerHTML='<option value="">Day\u2026</option>'; shSel.classList.add("cts-hide"); return; }
    if(t.type==="we"){
      hh='<option value="5">Weekend (Sat + Sun)</option>';
      shSel.classList.remove("cts-hide");
    } else {
      shSel.classList.add("cts-hide");
      t.days.forEach(function(d){ hh+='<option value="'+d+'">'+DAY_NAMES[d]+'</option>'; });
    }
    dSel.innerHTML=hh; refreshCur();
  }
  function refreshCur(){
    var t=taskById(tSel.value), sc=S.schedule;
    var hh='<option value="">(empty slot)</option>';
    if(t && sc){
      var d=+dSel.value||(t.type==="we"?5:0);
      var sh=t.type==="we"?shSel.value:null;
      (sc.cells[t.id+"_"+d]||[]).forEach(function(a){
        if(!a.empId||a.role) return;
        if(t.type==="we" && (a.shift||null)!==sh) return;
        var e=empById(a.empId); if(!e) return;
        hh+='<option value="'+e.id+'">replace: '+esc(e.name)+'</option>';
      });
    }
    cSel.innerHTML=hh; refreshNew();
  }
  function refreshNew(){
    var t=taskById(tSel.value);
    var hh='<option value="">New collaborator\u2026</option>';
    if(t){
      var d=+dSel.value||(t.type==="we"?5:0);
      var days=t.type==="we"?[5,6]:[d];
      manualEligibleNew(t, days, cSel.value||null).forEach(function(it){
        var e=it.e;
        hh+='<option value="'+e.id+'">'+esc(e.name)+' \u2014 L'+skillOf(e,t.id)
          +(isLeader(e)?" ("+(e.role==="mgr"?"Manager":"Team Leader")+")":"")
          +(it.busy.length?" (moves from "+esc(it.busy.join(", "))+")":"")+'</option>';
      });
      if(cSel.value) hh+='<option value="__remove__">\u2715 Remove this assignment</option>';
    }
    nSel.innerHTML=hh;
  }
  tSel.addEventListener("change",refreshDays);
  dSel.addEventListener("change",refreshCur);
  shSel.addEventListener("change",refreshCur);
  cSel.addEventListener("change",refreshNew);
  ap.addEventListener("click",function(){
    if(!tSel.value){ toast("Pick a position"); return; }
    var t=taskById(tSel.value);
    if(!nSel.value){ toast("Pick the new collaborator (or Remove)"); return; }
    var ok=manualApply(tSel.value, +dSel.value||0, t.type==="we"?shSel.value:null, cSel.value||null, nSel.value);
    if(ok){ toast("Schedule updated manually"); renderBoardWeek(); }
  });
  refreshDays();
 }catch(err){ try{ toast("Manual scheduling failed to initialise: "+err.message); }catch(e2){} }
}

     +'<div class="cts-note">Weekend positions run Saturday and Sunday with three shifts: <b>Early</b> and <b>Late</b> are complementary (together they cover the day) and <b>Mid</b> bridges the handover. <b>Each shift is held by ONE person for the whole weekend</b> \u2014 whoever takes Early works Early on both Saturday and Sunday, and the same for Late and Mid. Per-day splits happen only as a fallback when nobody can cover both days. Nobody takes two shifts on the same day.<br><br><b>Rest rules (always enforced, weekend-anchored):</b> if you <b>don\u2019t work the weekend, Saturday and Sunday ARE your days off</b> \u2014 there is no weekday rest entitlement and you can be scheduled on all five weekdays. If you <b>do work the weekend, the compensation lands in the FOLLOWING week</b>: a hard cap of 5 worked days that week guarantees at least 2 days off after the worked weekend \u2014 they may be split, and an off next-weekend counts as the compensation too. On top of everything: nobody ever works more than <b>6 consecutive days</b>, counted over the totality of weekday and weekend work. The scheduler tracks owed recuperation and prefers to place those off-days early in the week. If the rules make a slot unstaffable, the board reports <b>WORKFORCE INSUFFICIENT</b> instead of silently breaking them.<br><br><b>\u2696 Balanced vs Extra:</b> only positions marked <b>Balanced</b> feed the workload balances. <b>The weekend is ONE coverage unit:</b> exactly <b>three collaborators</b> work it \u2014 one Early, one Mid, one Late \u2014 the <b>same three people on Saturday and Sunday</b> (one per shift per day), and together they <b>cover every other position</b>: nothing else is staffed on weekends. The highest-priority weekend position is the coverage unit; any other position simply shows \u201Cweekend team\u201D on Sat/Sun.<br><br><b>Weekday and weekend balances are STRICTLY separate \u2014 and measured in different units.</b> Weekdays balance <b>workload</b> (assignments vs availability-weighted fair share). Weekends balance <b>how many WEEKENDS each collaborator works per month</b> \u2014 a Sat+Sun pair counts as one weekend, tallied month-to-date in the panel and carried across months by its own ledger. Separate counters, separate carry, no scoring term ever reads the other side. <b>Rest rules are the one thing counted over the TOTALITY of worked days</b>: the 6-in-a-row limit, the 10-in-any-14 window and recuperation all count weekday and weekend work together \u2014 a body only has one calendar. Positions toggled to <b>Extra</b> / <b>Weekend extra</b> (projects, workshops, side duties\u2026) are levelled among themselves outside both balances and appear in a footnote.<br><br><b>No esc tag:</b> positions tagged \u201Cno mandatory escalation\u201D are never staffed by escalated Team Leaders / Managers \u2014 when workforce runs short, they deliberately stay UNFILLED (marked as \u201Cleft unfilled by design\u201D) so leadership capacity is reserved for the positions that truly require cover.<br><br><b>Priority ranks &amp; Suggest:</b> the <b>Rank</b> column is the fill order \u2014 rank 1 is staffed first, ALWAYS. Positions toggled to <b>\uD83D\uDCA1 Suggest</b> are proposed only when spare people remain after every Core position is covered; when nobody is spare they are skipped cleanly (grey \u201Cno spare\u201D, listed as skipped suggestions) and never trigger WORKFORCE INSUFFICIENT. Leadership is never escalated for a Suggest position.<br><br><b>Training tag (per-day sessions):</b> a tagged position leaves the normal rotation and is driven by <b>sessions</b>: pick the exact date, the trainer and the trainees \u2014 the session then appears on that day on the Board and Month calendar. Participants are locked out of everything else that day with <b>zero workload</b>; the carry ledger marks them \u201Cbehind\u201D and compensates afterwards. Adding a session inside an already-generated week raises the Structure banner \u2014 one click adapts the schedules.<br><br><b>Balance is a goal, not a gate.</b> The scheduler always produces the fullest schedule the hard rules allow (skills, absences, rest); when vacations or missing people make weekly balance impossible, the imbalance is written to a signed <b>carry ledger</b> (\u201Cbehind\u201D / \u201Cahead\u201D in the workload panels) and compensated over the following weeks and months. Fair share is availability-weighted, so vacation days never create work-debt.<br><br>Adding, removing or reconfiguring positions after schedules exist raises a <b>Structure changed</b> banner on the Board with a one-click regeneration of the current and future weeks.</div>';

    S.tasks.push(ty==="we" ? {id:uid(),type:"we",name:n,minLevel:2,slots:1,days:[5,6],balance:true,training:null,rank:nextRank,optional:false,noEscalation:false}
                           : {id:uid(),type:"wk",name:n,minLevel:2,slots:1,days:[0,1,2,3,4],balance:true,training:null,rank:nextRank,optional:false,noEscalation:false});
    save(); renderTasks(); });
  var tr=document.getElementById("cts-train");
  if(tr) tr.addEventListener("input",function(){
    S.trainingRate=+this.value/100; document.getElementById("cts-trainval").textContent=this.value+"%"; save(); });
}

function renderAbs(){
  var v=document.getElementById("cts-view-abs");
  var me=colab?empById(colab):null;
  var h="";
  if(!S.absences.length) h+='<div class="cts-empty">No absences recorded.</div>';
  else{
    h+='<div class="cts-boardwrap"><table class="cts-admin"><thead><tr><th>Employee</th><th>Type</th><th>From</th><th>To</th><th>Status</th><th>Justification</th>';
    if(admin) h+='<th></th>'; h+='</tr></thead><tbody>';
    S.absences.slice().sort(function(a,b){return a.from<b.from?-1:1;}).forEach(function(a){
      var e=empById(a.empId);
      var canSee = admin || (me && me.id===a.empId);
      h+='<tr><td>'+esc(e?e.name:"?")+'</td><td><span class="cts-abschip cts-'+a.type+'">'+ABS_TYPES[a.type]+'</span></td>'
       +'<td style="font-family:var(--cts-mono)">'+esc(a.from)+'</td><td style="font-family:var(--cts-mono)">'+esc(a.to)+'</td>'
       +'<td><span class="cts-absstat cts-'+a.status+'">'+a.status+'</span></td><td>';
      if(canSee){
        if(a.justification) h+='<div class="cts-just">'+esc(a.justification)+'</div>';
        (a.docs||[]).forEach(function(doc,di){
          h+='<a class="cts-doclink" href="'+doc.data+'" download="'+esc(doc.name)+'" title="'+esc(doc.name)+'">\uD83D\uDCCE '+esc(doc.name)+'</a>';
          if(admin || (me && me.id===a.empId && a.status==="pending"))
            h+='<button class="cts-btn cts-btn-sm cts-btn-danger" data-cts-deldoc="'+a.id+'|'+di+'" title="Remove document">\u00D7</button>';
        });
        if(me && me.id===a.empId){
          h+='<div style="margin-top:4px"><label class="cts-btn cts-btn-sm" style="display:inline-block">\uD83D\uDCCE attach<input type="file" class="cts-photo-in" data-cts-absdoc="'+a.id+'"></label>'
           +' <button class="cts-btn cts-btn-sm" data-cts-absjust="'+a.id+'">justify</button></div>';
        }
        if(!a.justification && !(a.docs||[]).length && !(me && me.id===a.empId)) h+='<span class="cts-na">\u2014</span>';
      } else {
        h+='<span class="cts-na" title="Visible to the person and admins only">private</span>';
      }
      h+='</td>';
      if(admin){
        h+='<td style="white-space:nowrap">';
        if(a.status==="pending")
          h+='<button class="cts-btn cts-btn-sm cts-btn-primary" data-cts-absok="'+a.id+'">Approve</button> '
           +'<button class="cts-btn cts-btn-sm cts-btn-amber" data-cts-absrej="'+a.id+'">Reject</button> ';
        if(a.status==="rejected")
          h+='<button class="cts-btn cts-btn-sm" data-cts-absok="'+a.id+'">Re-approve</button> ';
        h+='<button class="cts-btn cts-btn-sm cts-btn-danger" data-cts-delabs="'+a.id+'">Remove</button></td>';
      }
      h+='</tr>';
    });
    h+='</tbody></table></div>';
  }
  // --- declaration forms ---
  if(admin){
    h+='<div class="cts-formrow"><select id="cts-absemp">';
    S.employees.forEach(function(e){ h+='<option value="'+e.id+'">'+esc(e.name)+'</option>'; });
    h+='</select><select id="cts-abstype"><option value="vac">Vacation</option><option value="sick">Sick</option><option value="oth">Other</option></select>'
     +'<input type="date" id="cts-absfrom"><input type="date" id="cts-absto">'
     +'<button class="cts-btn" id="cts-addabs">Add absence</button></div>';
  }
  if(me){
    h+='<div class="cts-cardbox" style="margin-top:14px"><h3>Declare my absence \u2014 '+esc(me.name)+'</h3>'
     +'<div class="cts-formrow"><select id="cts-myabstype"><option value="sick">Sick</option><option value="vac">Vacation</option><option value="oth">Other</option></select>'
     +'<input type="date" id="cts-myabsfrom"><input type="date" id="cts-myabsto">'
     +'</div><div class="cts-formrow"><input id="cts-myabsjust" placeholder="Justification (e.g. medical appointment, transport strike\u2026)" style="flex:1;min-width:200px">'
     +'<label class="cts-btn" style="display:inline-block">\uD83D\uDCCE document<input type="file" class="cts-photo-in" id="cts-myabsdoc"></label>'
     +'<span id="cts-myabsdocname" style="font-size:11px;color:var(--cts-mut)"></span>'
     +'<button class="cts-btn cts-btn-primary" id="cts-myabssend">Declare</button></div>'
     +'<div class="cts-note">You can declare <b>before</b> the day (planned absence) or <b>after</b> (justify a missed day \u2014 pick the past date). The declaration lands as <b>pending</b> until an admin reviews the justification; it already counts on the schedule so nobody is assigned in your place by mistake. Attach a supporting document (photo or PDF): images are compressed automatically, other files up to ~300&nbsp;KB.</div></div>';
  } else if(!admin){
    h+='<div class="cts-note" style="margin-top:12px">Sign in as a collaborator (top right) to declare and justify your own absences with supporting documents.</div>';
  }
  v.innerHTML=h;

  /* ---- shared doc reader: images resized, other small files as-is ---- */
  function readDoc(file, cb){
    if(!file) return;
    if(/^image\//.test(file.type)){
      var rd=new FileReader();
      rd.onload=function(){
        var img=new Image();
        img.onload=function(){
          try{
            var MAX=1000, sc=Math.min(1, MAX/Math.max(img.width,img.height));
            var c=document.createElement("canvas");
            c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
            c.getContext("2d").drawImage(img,0,0,c.width,c.height);
            cb({name:file.name, mime:"image/jpeg", data:c.toDataURL("image/jpeg",0.7)});
          }catch(err){ toast("Could not process the image"); }
        };
        img.src=rd.result;
      };
      rd.readAsDataURL(file);
    } else {
      if(file.size>300*1024){ toast("File too large \u2014 keep documents under 300 KB (or send an image/photo)"); return; }
      var rd2=new FileReader();
      rd2.onload=function(){ cb({name:file.name, mime:file.type||"application/octet-stream", data:rd2.result}); };
      rd2.readAsDataURL(file);
    }
  }
  function absById(id){ for(var i=0;i<S.absences.length;i++) if(S.absences[i].id===id) return S.absences[i]; return null; }

  // attach to an existing absence (owner)
  v.querySelectorAll("[data-cts-absdoc]").forEach(function(inp){
    inp.addEventListener("change",function(){
      var a=absById(this.getAttribute("data-cts-absdoc")); var f=this.files&&this.files[0];
      if(!a||!f) return;
      if((a.docs||[]).length>=3){ toast("Maximum 3 documents per absence"); return; }
      readDoc(f,function(doc){ a.docs=a.docs||[]; a.docs.push(doc); save(); renderAbs(); toast("Document attached"); });
    });
  });
  v.querySelectorAll("[data-cts-deldoc]").forEach(function(b){ b.addEventListener("click",function(){
    var p=this.getAttribute("data-cts-deldoc").split("|");
    var a=absById(p[0]); if(!a||!a.docs) return;
    a.docs.splice(+p[1],1); save(); renderAbs(); }); });
  v.querySelectorAll("[data-cts-absjust]").forEach(function(b){ b.addEventListener("click",function(){
    var a=absById(this.getAttribute("data-cts-absjust")); if(!a) return;
    var j=prompt("Justification:", a.justification||"");
    if(j===null) return;
    a.justification=j.trim();
    if(a.status==="rejected") a.status="pending";
    save(); renderAbs(); }); });

  // admin review + admin add + remove
  v.querySelectorAll("[data-cts-absok]").forEach(function(b){ b.addEventListener("click",function(){
    var a=absById(this.getAttribute("data-cts-absok")); if(a){ a.status="ok"; save(); renderAbs(); } }); });
  v.querySelectorAll("[data-cts-absrej]").forEach(function(b){ b.addEventListener("click",function(){
    var a=absById(this.getAttribute("data-cts-absrej")); if(!a) return;
    if(confirm("Reject this justification? The absence stops counting on the schedule (regenerate or handle via change request if the week is already published).")){
      a.status="rejected"; save(); renderAbs(); } }); });
  v.querySelectorAll("[data-cts-delabs]").forEach(function(b){ b.addEventListener("click",function(){
    var id=this.getAttribute("data-cts-delabs"); S.absences=S.absences.filter(function(a){return a.id!==id;}); save(); renderAbs(); }); });
  var ad=document.getElementById("cts-addabs");
  if(ad) ad.addEventListener("click",function(){
    var eId=document.getElementById("cts-absemp").value;
    var ty=document.getElementById("cts-abstype").value;
    var f=document.getElementById("cts-absfrom").value, t=document.getElementById("cts-absto").value||f;
    if(!eId||!f){ toast("Pick an employee and a start date"); return; }
    if(t<f){ var tmp=f; f=t; t=tmp; }
    S.absences.push({id:uid(),empId:eId,from:f,to:t,type:ty,status:"ok",justification:"",docs:[],declaredBy:"admin"});
    save(); renderAbs(); });

  // collaborator self-declaration
  var pendingDoc=null;
  var myDoc=document.getElementById("cts-myabsdoc");
  if(myDoc) myDoc.addEventListener("change",function(){
    var f=this.files&&this.files[0]; if(!f) return;
    readDoc(f,function(doc){ pendingDoc=doc;
      document.getElementById("cts-myabsdocname").textContent=doc.name; });
  });
  var mySend=document.getElementById("cts-myabssend");
  if(mySend) mySend.addEventListener("click",function(){
    var f=document.getElementById("cts-myabsfrom").value, t=document.getElementById("cts-myabsto").value||f;
    if(!f){ toast("Pick the date(s)"); return; }
    if(t<f){ var tmp=f; f=t; t=tmp; }
    S.absences.push({id:uid(), empId:me.id, from:f, to:t,
      type:document.getElementById("cts-myabstype").value,
      status:"pending",
      justification:document.getElementById("cts-myabsjust").value.trim(),
      docs: pendingDoc?[pendingDoc]:[],
      declaredBy:me.id});
    save(); renderAbs(); toast("Absence declared \u2014 pending admin review");
  });
}

/* ---------- Requests view ---------- */
function renderReq(){
  var v=document.getElementById("cts-view-req");
  var sc=S.schedule, h="";
  var me=colab?empById(colab):null;
  if(!admin && !me){
    v.innerHTML='<div class="cts-empty">Change requests are personal.<br>Sign in as a collaborator (top right) to file requests and see the status of yours \u2014 or unlock Admin to manage all of them.<br><br><button class="cts-btn cts-btn-primary" id="cts-req-signin">Collaborator sign-in</button></div>';
    var sb=document.getElementById("cts-req-signin");
    if(sb) sb.addEventListener("click",colabSignIn);
    return;
  }
  // --- new request form ---
  h+='<div class="cts-cardbox" style="margin-bottom:14px"><h3>Request a schedule change'+(me?' \u2014 as '+esc(me.name):"")+'</h3>';
  if(!sc){ h+='<div class="cts-note">No active schedule to change yet.</div>'; }
  else{
    h+='<div class="cts-formrow"><select id="cts-req-slot">';
    S.tasks.forEach(function(t){
      for(var d=0;d<sc.days;d++){
        var cell=sc.cells[t.id+"_"+d]||[];
        cell.forEach(function(a,ix){
          if(!a.empId || a.role || a.mergedFrom || a.mergedWith) return;   // training and merged desks are locked
          var e=empById(a.empId); if(!e) return;
          if(me && !admin && a.empId!==me.id) return;   // collaborators swap their own assignments
          h+='<option value="'+t.id+'|'+d+'|'+a.empId+'|'+(a.shift||"")+'">'
           +esc(t.name)+' \u00B7 '+DAY_NAMES[d]+' '+fmtShort(addDays(sc.weekStart,d))
           +(a.shift?' \u00B7 '+shiftLabel(a.shift):"")+' \u2014 '+esc(e.name)+'</option>';
        });
      }
    });
    h+='</select><span style="color:var(--cts-mut);font-size:12px">replace with</span><select id="cts-req-new"><option value="">(admin decides)</option></select>'
     +'</div><div class="cts-formrow">'
     +(me?'':'<input id="cts-req-by" placeholder="Your name" style="width:140px">')
     +'<input id="cts-req-why" placeholder="Reason (optional)" style="flex:1;min-width:180px">'
     +'<button class="cts-btn cts-btn-primary" id="cts-req-send">Submit request</button></div>';
  }
  h+='</div>';
  // --- request list (admins: all, collaborators: own) ---
  var list=S.requests.filter(function(r){ return admin || (me && (r.requesterId===me.id)); });
  if(!list.length) h+='<div class="cts-empty">'+(admin?"No change requests yet.":"You have no change requests yet.")+'</div>';
  list.slice().reverse().forEach(function(r){
    var t=taskById(r.taskId), ce=empById(r.currentEmpId), pe=r.proposedEmpId?empById(r.proposedEmpId):null, ae=r.altEmpId?empById(r.altEmpId):null;
    h+='<div class="cts-req"><div class="cts-req-head"><span class="cts-status cts-'+r.status+'">'+r.status+'</span>'
     +'<span class="cts-req-meta">'+esc(r.requester||"anonymous")+' \u00B7 week '+esc(r.weekStart)+' \u00B7 '+esc((r.ts||"").slice(0,10))+'</span></div>'
     +'<div class="cts-req-body">Replace <b>'+esc(ce?ce.name:"?")+'</b> on <b>'+esc(t?t.name:"(deleted position)")+'</b> \u2014 '
     +DAY_NAMES[r.day]+(r.shift?' \u00B7 '+shiftLabel(r.shift)+' shift':"")
     +(pe?' \u2192 with <b>'+esc(pe.name)+'</b>':' \u2192 replacement left to admin')
     +(r.reason?'<div class="cts-req-meta">Reason: '+esc(r.reason)+'</div>':"")
     +(r.adminNote?'<div class="cts-req-meta">Admin: '+esc(r.adminNote)+(ae?' \u2014 proposes <b>'+esc(ae.name)+'</b>':"")+'</div>':"")
     +'</div>';
    if(admin && r.status==="pending"){
      h+='<div class="cts-req-actions">';
      if(pe) h+='<button class="cts-btn cts-btn-sm cts-btn-primary" data-cts-approve="'+r.id+'">Approve</button>';
      h+='<select data-cts-altsel="'+r.id+'">'+(pe?'<option value="">alternative\u2026</option>':'<option value="">choose replacement\u2026</option>');
      (function(){
        var tt=taskById(r.taskId);
        S.employees.forEach(function(e){
          if(e.id===r.currentEmpId) return;
          if(tt){
            if(skillOf(e,tt.id)<2) return;                       // level 1 cannot do the position — not even escalated
            if(isLeader(e) && !e.escalated) return;
            if(isLeader(e) && (tt.noEscalation || tt.optional)) return;
          }
          h+='<option value="'+e.id+'">'+esc(e.name)+(tt?' \u2014 L'+skillOf(e,tt.id):"")+'</option>';
        });
      })();
      h+='</select><button class="cts-btn cts-btn-sm cts-btn-amber" data-cts-alt="'+r.id+'">Suggest / apply alternative</button>'
       +'<button class="cts-btn cts-btn-sm cts-btn-danger" data-cts-decline="'+r.id+'">Decline</button></div>';
    }
    if(r.status==="alt" && (admin || (me && r.requesterId===me.id))){
      h+='<div class="cts-req-actions"><span style="font-size:12px;color:var(--cts-mut)">Counter-proposal pending \u2014 requester:</span>'
       +'<button class="cts-btn cts-btn-sm cts-btn-primary" data-cts-acceptalt="'+r.id+'">Accept alternative</button>'
       +'<button class="cts-btn cts-btn-sm cts-btn-danger" data-cts-refusealt="'+r.id+'">Refuse</button></div>';
    }
    h+='</div>';
  });
  v.innerHTML=h;

  var send=document.getElementById("cts-req-send");
  /* only people who CAN do the task are ever offered: level 1 = cannot do the
     position at all — not even via escalation */
  function eligibleReplacements(t, excludeId){
    return S.employees.filter(function(e){
      if(e.id===excludeId) return false;
      if(skillOf(e,t.id)<2) return false;                 // level 1: never, full stop
      if(isLeader(e) && !e.escalated) return false;
      if(isLeader(e) && (t.noEscalation || t.optional)) return false;
      return true;
    });
  }
  function rebuildReplacementOptions(){
    var slotEl=document.getElementById("cts-req-slot"), newEl=document.getElementById("cts-req-new");
    if(!slotEl||!newEl) return;
    var p=(slotEl.value||"").split("|"), t=taskById(p[0]);
    var keep=newEl.value;
    var hh='<option value="">(admin decides)</option>';
    if(t) eligibleReplacements(t,p[2]).forEach(function(e){
      hh+='<option value="'+e.id+'"'+(e.id===keep?" selected":"")+'>'+esc(e.name)+' \u2014 L'+skillOf(e,t.id)+'</option>'; });
    newEl.innerHTML=hh;
  }
  var slotSel=document.getElementById("cts-req-slot");
  if(slotSel){ slotSel.addEventListener("change",rebuildReplacementOptions); rebuildReplacementOptions(); }
  if(send) send.addEventListener("click",function(){
    var slotEl=document.getElementById("cts-req-slot");
    var slot=slotEl?slotEl.value:""; if(!slot){ toast("No assignment selected"); return; }
    var p=slot.split("|");
    var byEl=document.getElementById("cts-req-by");
    S.requests.push({id:uid(), ts:new Date().toISOString(),
      requester: me? me.name : ((byEl&&byEl.value.trim())||spUser),
      requesterId: me? me.id : null,
      weekStart:S.schedule.weekStart, taskId:p[0], day:+p[1], currentEmpId:p[2], shift:p[3]||null,
      proposedEmpId:document.getElementById("cts-req-new").value||null,
      reason:document.getElementById("cts-req-why").value.trim(), status:"pending", adminNote:"", altEmpId:null});
    save(); renderReq(); toast("Request submitted");
  });
  function req(id){ for(var i=0;i<S.requests.length;i++) if(S.requests[i].id===id) return S.requests[i]; return null; }
  v.querySelectorAll("[data-cts-approve]").forEach(function(b){ b.addEventListener("click",function(){
    var r=req(this.getAttribute("data-cts-approve")); if(!r||!r.proposedEmpId) return;
    if(applyChange(r,r.proposedEmpId)){ r.status="approved"; save(); render(); toast("Change applied"); } }); });
  v.querySelectorAll("[data-cts-alt]").forEach(function(b){ b.addEventListener("click",function(){
    var id=this.getAttribute("data-cts-alt"); var r=req(id); if(!r) return;
    var sel=v.querySelector('[data-cts-altsel="'+id+'"]'); var alt=sel?sel.value:"";
    if(!alt){ toast("Pick the alternative person first"); return; }
    var note=prompt("Note to the requester (optional):")||"";
    if(!r.proposedEmpId){
      // requester left the choice to admin: apply directly
      r.altEmpId=alt; r.adminNote=note;
      if(applyChange(r,alt)){ r.status="approved"; save(); render(); toast("Change applied"); }
    } else {
      r.altEmpId=alt; r.adminNote=note; r.status="alt"; save(); renderReq(); toast("Counter-proposal sent");
    } }); });
  v.querySelectorAll("[data-cts-decline]").forEach(function(b){ b.addEventListener("click",function(){
    var r=req(this.getAttribute("data-cts-decline")); if(!r) return;
    r.adminNote=prompt("Reason for declining (optional):")||r.adminNote;
    r.status="declined"; save(); render(); }); });
  v.querySelectorAll("[data-cts-acceptalt]").forEach(function(b){ b.addEventListener("click",function(){
    var r=req(this.getAttribute("data-cts-acceptalt")); if(!r||!r.altEmpId) return;
    if(applyChange(r,r.altEmpId)){ r.status="approved"; save(); render(); toast("Alternative applied"); } }); });
  v.querySelectorAll("[data-cts-refusealt]").forEach(function(b){ b.addEventListener("click",function(){
    var r=req(this.getAttribute("data-cts-refusealt")); if(!r) return; r.status="declined"; save(); render(); }); });
}

/* ---------- Merges tab: which positions may merge, and in which order ---------- */
function renderMerge(){
  var v=document.getElementById("cts-view-merge");
  var wkTasks=tasksByRank().filter(function(t){ return t.type!=="we" && !t.training; });
  var h='<div class="cts-cardbox"><h3>Position merges</h3>'
   +'<div class="cts-note" style="margin-top:6px">When a PRIORITY position is still unfilled after rotation and cascade redistribution, these rules are tried <b>top to bottom</b>: if the paired position is staffed that day by someone qualified for the unfilled one, the two positions become <b>ONE combined position \u201CA+B\u201D</b> on the board, held by that collaborator. A rule can also trigger a <b>task redistribution</b>: a third position of your choice is replaced that day by a <b>new position you name</b> (its expanded form) \u2014 same staffing, and its workload <b>keeps counting toward the original position\u2019s balance</b>. One merge per person per day; merged coverage adds no extra workload unit. Merges apply to weekday positions (weekends are the trio\u2019s).</div>';
  if(!(S.merges||[]).length){
    h+='<div class="cts-empty" style="margin-top:10px">No merge rules defined.'+(admin?' Add the first one below.':'')+'</div>';
  } else {
    h+='<table class="cts-admin" style="margin-top:10px"><thead><tr><th style="width:60px">Order</th><th>Position A</th><th>Position B</th><th>Task redistribution when merged</th>'+(admin?'<th></th>':'')+'</tr></thead><tbody>';
    S.merges.forEach(function(m,ix){
      var ta=taskById(m.a), tb=taskById(m.b);
      h+='<tr><td style="font-family:var(--cts-mono)">'+(ix+1)
       +(admin?' <button class="cts-btn cts-btn-sm" data-cts-mup="'+m.id+'" '+(ix===0?'disabled':'')+'>\u2191</button><button class="cts-btn cts-btn-sm" data-cts-mdn="'+m.id+'" '+(ix===S.merges.length-1?'disabled':'')+'>\u2193</button>':'')
       +'</td><td>'+esc(ta?ta.name:"(removed)")+'</td><td>'+esc(tb?tb.name:"(removed)")+'</td>'
       +'<td>'+(function(){
          var tr2=m.replaceTask?taskById(m.replaceTask):null;
          var shown=(tr2&&m.replaceName)
            ? esc(tr2.name)+' <span class="cts-tag">\u2192 '+esc(m.replaceName)+'</span>'
            : '<span class="cts-na">\u2014 none</span>';
          if(!admin) return shown;
          var ed='<div class="cts-formrow" style="margin-top:4px"><select data-cts-mrt="'+m.id+'"><option value="">(no redistribution)</option>';
          tasksByRank().forEach(function(t3){
            if(t3.type==="we"||t3.training||t3.id===m.a||t3.id===m.b) return;
            ed+='<option value="'+t3.id+'"'+(m.replaceTask===t3.id?" selected":"")+'>'+esc(t3.name)+'</option>';
          });
          ed+='</select><input data-cts-mrn="'+m.id+'" value="'+esc(m.replaceName||"")+'" placeholder="runs as\u2026" style="width:120px">'
            +'<button class="cts-btn cts-btn-sm" data-cts-mrsave="'+m.id+'">Set</button></div>';
          return shown+ed;
        })()+'</td>'
       +(admin?'<td><button class="cts-btn cts-btn-sm cts-btn-danger" data-cts-mdel="'+m.id+'">Remove</button></td>':'')+'</tr>';
    });
    h+='</tbody></table>';
  }
  if(admin){
    h+='<div class="cts-formrow" style="margin-top:12px;border-top:1px solid var(--cts-line);padding-top:10px">'
     +'<select id="cts-merge-a"><option value="">Position A\u2026</option>';
    wkTasks.forEach(function(t){ h+='<option value="'+t.id+'">'+esc(t.name)+'</option>'; });
    h+='</select><span style="color:var(--cts-mut)">+</span><select id="cts-merge-b"><option value="">Position B\u2026</option>';
    wkTasks.forEach(function(t){ h+='<option value="'+t.id+'">'+esc(t.name)+'</option>'; });
    h+='</select><span style="color:var(--cts-mut);font-size:12px">\u2192 replaces</span><select id="cts-merge-rt"><option value="">(no redistribution)</option>';
    wkTasks.forEach(function(t){ h+='<option value="'+t.id+'">'+esc(t.name)+'</option>'; });
    h+='</select><span style="color:var(--cts-mut);font-size:12px">as</span><input id="cts-merge-name" placeholder="New position name" style="width:160px"><button class="cts-btn cts-btn-primary" id="cts-merge-add">Add merge rule</button></div>'
     +'<div class="cts-note">Changing merge rules updates the structure fingerprint \u2014 adapt schedules from the Board banner.</div>';
  }
  h+='</div>';
  v.innerHTML=h;
  if(!admin) return;
  var add=document.getElementById("cts-merge-add");
  if(add) add.addEventListener("click",function(){
    var a=document.getElementById("cts-merge-a").value, b=document.getElementById("cts-merge-b").value;
    if(!a||!b){ toast("Pick both positions"); return; }
    if(a===b){ toast("A position cannot merge with itself"); return; }
    var dup=(S.merges||[]).some(function(m){ return (m.a===a&&m.b===b)||(m.a===b&&m.b===a); });
    if(dup){ toast("That pair already has a rule"); return; }
    var rt=document.getElementById("cts-merge-rt").value||null;
    var rn=(document.getElementById("cts-merge-name").value||"").trim();
    if(rt && !rn){ toast("Name the position that replaces it"); return; }
    if(rt && (rt===a||rt===b)){ toast("The redistributed position must be a THIRD position, not one of the merging pair"); return; }
    S.merges.push({id:uid(), a:a, b:b, replaceTask:rt, replaceName:rn||null});
    save(); renderMerge(); toast("Merge rule added \u2014 adapt schedules from the Board banner");
  });
  v.querySelectorAll("[data-cts-mrsave]").forEach(function(bn){ bn.addEventListener("click",function(){
    var id=this.getAttribute("data-cts-mrsave");
    var m=null; for(var i4=0;i4<S.merges.length;i4++){ if(S.merges[i4].id===id){ m=S.merges[i4]; break; } }
    if(!m) return;
    var sel=v.querySelector('[data-cts-mrt="'+id+'"]'), inp=v.querySelector('[data-cts-mrn="'+id+'"]');
    var rt=sel?sel.value||null:null, rn=inp?(inp.value||"").trim():"";
    if(rt && !rn){ toast("Name the position that replaces it"); return; }
    if(rt && (rt===m.a||rt===m.b)){ toast("Pick a THIRD position, not one of the merging pair"); return; }
    m.replaceTask=rt; m.replaceName=rt?rn:null;
    save(); renderMerge();
    toast(rt?"Redistribution set \u2014 adapt schedules from the Board banner":"Redistribution removed"); }); });
  v.querySelectorAll("[data-cts-mdel]").forEach(function(bn){ bn.addEventListener("click",function(){
    var id=this.getAttribute("data-cts-mdel");
    S.merges=S.merges.filter(function(m){return m.id!==id;});
    save(); renderMerge(); }); });
  v.querySelectorAll("[data-cts-mup]").forEach(function(bn){ bn.addEventListener("click",function(){
    var id=this.getAttribute("data-cts-mup");
    var ix=S.merges.findIndex? S.merges.findIndex(function(m){return m.id===id;}) : -1;
    if(ix<0){ for(var i2=0;i2<S.merges.length;i2++){ if(S.merges[i2].id===id){ ix=i2; break; } } }
    if(ix>0){ var t2=S.merges[ix-1]; S.merges[ix-1]=S.merges[ix]; S.merges[ix]=t2; save(); renderMerge(); } }); });
  v.querySelectorAll("[data-cts-mdn]").forEach(function(bn){ bn.addEventListener("click",function(){
    var id=this.getAttribute("data-cts-mdn");
    var ix=-1; for(var i3=0;i3<S.merges.length;i3++){ if(S.merges[i3].id===id){ ix=i3; break; } }
    if(ix>-1 && ix<S.merges.length-1){ var t3=S.merges[ix+1]; S.merges[ix+1]=S.merges[ix]; S.merges[ix]=t3; save(); renderMerge(); } }); });
}

/* ---------- Rules tab: the whole rulebook, tunables editable by admin ---------- */
function renderRules(){
  var v=document.getElementById("cts-view-rules");
  var R=RULES();
  var h='<div class="cts-cardbox"><h3>Configurable parameters</h3>';
  if(admin){
    h+='<div class="cts-formrow"><label style="font-size:12px;color:var(--cts-mut)">Max consecutive workdays</label>'
     +'<input type="number" min="3" max="10" value="'+R.maxConsecutive+'" id="cts-rule-maxc" style="width:64px">'
     +'<label style="font-size:12px;color:var(--cts-mut)">Max worked days in the week after a worked weekend</label>'
     +'<input type="number" min="3" max="7" value="'+R.postWeekendCap+'" id="cts-rule-pwc" style="width:64px"></div>'
     +'<div class="cts-formrow"><label style="font-size:12px;color:var(--cts-mut)">Training intensity</label>'
     +'<input type="range" min="0" max="100" value="'+Math.round((S.trainingRate||0)*100)+'" id="cts-rule-tr">'
     +'<span style="font-family:var(--cts-mono);font-size:12px" id="cts-rule-trv">'+Math.round((S.trainingRate||0)*100)+'%</span></div>'
     +'<div class="cts-note">Changing a parameter updates the structure fingerprint \u2014 the Board shows the amber banner and one click adapts current + future weeks. Past weeks are never touched.</div>';
  } else {
    h+='<div class="cts-note">Max consecutive workdays: <b>'+R.maxConsecutive+'</b> \u00B7 Post-weekend week cap: <b>'+R.postWeekendCap+'</b> \u00B7 Training intensity: <b>'+Math.round((S.trainingRate||0)*100)+'%</b> \u2014 an admin can adjust these.</div>';
  }
  h+='</div>';

  function sec(title, items){
    h+='<div class="cts-cardbox" style="margin-top:12px"><h3>'+title+'</h3><ul style="margin:8px 0 2px 18px;padding:0;display:grid;gap:7px;font-size:13.5px;line-height:1.5">';
    items.forEach(function(it){ h+='<li>'+it+'</li>'; });
    h+='</ul></div>';
  }
  sec("Priority \u0026 positions",[
    "Every position has a <b>rank</b>: rank 1 is filled first, ALWAYS. Core positions are never sacrificed for lower-priority ones \u2014 under scarcity, gaps land on the lowest rank.",
    "<b>\uD83D\uDCA1 Suggest</b> positions are staffed only with people left over after every core position is covered. Skipping them is never an insufficiency and never escalates leadership.",
    "<b>Extra</b> positions (balance off) are levelled among themselves, outside both workload balances.",
    "<b>Position merges:</b> when a priority position stays unfilled even after redistribution, admin-defined merge rules (Merges tab, tried in order) let the collaborator on the paired position cover <b>both as one desk</b> \u2014 one merge per person per day, no extra workload unit.",
    "<b>Cascade redistribution:</b> if the free collaborators can\u2019t do an unfilled position but a colleague assigned elsewhere that day CAN, the capable colleague is moved onto it and the free collaborator takes over the vacated position \u2014 priority work always lands on capable hands before any gap is declared.",
    "Unstaffable PRIORITY slots trigger the red <b>WORKFORCE INSUFFICIENT</b> banner with per-slot reasons; balance never blocks production.",
    "<b>Manual scheduling</b> (admin, current week): assign, replace or remove anyone on any slot from the Board \u2014 hard rules still enforced (level 1 never, absences, streak, post-weekend cap); weekend edits apply to both days; manual entries carry an <b>M</b> tag and are overwritten on regeneration."
  ]);
  sec("Skills",[
    "Level <b>1 = cannot do the position AT ALL</b>: never assigned, never suggested as replacement, never covered via escalation. Training sessions are the only path from 1 to 2.",
    "Positions require a minimum level of 2\u20134. Development picks (one level below the minimum, never below 2) may join alongside a qualified colleague, at the configured training intensity.",
    "Specialist fairness: rotation is compared within the group of people CAPABLE of each position, so rare skills rotate among their holders."
  ]);
  sec("Weekend",[
    "The weekend is <b>one coverage unit: exactly three collaborators</b> \u2014 one Early, one Mid, one Late \u2014 the <b>same trio on Saturday and Sunday</b> (one per shift per day). Per-day split only if nobody can hold a shift both days.",
    "The trio <b>covers all other positions</b>: nothing else is staffed on weekends; other rows show \u201Cweekend team\u201D.",
    "Weekend fairness is measured in <b>weekends per month</b> (a Sat+Sun pair = 1), with its own carry ledger across months.",
    "A weekend swap through Requests always moves <b>both days together</b>."
  ]);
  sec("Rest \u0026 days off",[
    "<b>Weekend not worked \u2192 Saturday and Sunday ARE the days off.</b> All five weekdays are workable. A collaborator with <b>no task on a weekday is an ALERT</b> \u2014 the board flags \u201C\u26A0 no task\u201d and a manual position must be given; it is never displayed as a day off.",
    "<b>Weekday days off exist ONLY as compensation after a worked weekend \u2014 absolutely only.</b> The week after a worked weekend is hard-capped at "+R.postWeekendCap+" worked days; the compensation may be split and an off next-weekend counts.",
    "Universal wall: never more than <b>"+R.maxConsecutive+" consecutive workdays</b>, counted over the totality of weekday + weekend work, across week boundaries.",
    "The recup counter tracks owed compensation and rests those people early in the following week when coverage allows."
  ]);
  sec("Balance",[
    "<b>Weekday and weekend balances are strictly separate</b> and use different units: weekday = workload vs availability-weighted fair share; weekend = number of weekends per month. No scoring term reads the other side.",
    "<b>Balance is a goal, not a gate</b>: imbalances (vacations, training, missing people) go to signed carry ledgers (\u201Cbehind / ahead\u201D) and are compensated over the following weeks and months.",
    "Vacation never creates work-debt: fair share is availability-weighted."
  ]);
  sec("Leadership",[
    "Team Leaders and Managers are outside the rotation and all balances. When <b>escalated</b>, they join as last resort only, rotating among escalated leaders.",
    "Positions tagged <b>No esc</b> stay unfilled rather than pulling leadership. Level 1 still blocks an escalated leader.",
    "Escalation cover is footnoted under the workload panels."
  ]);
  sec("Training",[
    "Training positions run as <b>per-day sessions</b>: date + trainer + trainees, visible on that exact day on the Board and Month calendar.",
    "Participants are locked out of everything else that day with zero workload; the carry ledger compensates them afterwards.",
    "Adding a session inside a generated week raises the Structure banner \u2014 one click adapts."
  ]);
  sec("Requests \u0026 absences",[
    "Collaborators sign in to file requests on their OWN assignments; replacement lists only ever contain eligible people (level \u2265 2 on that position).",
    "Admin can approve, decline with a note, or counter-propose; the owner accepts or refuses the counter-proposal.",
    "Absences can be declared before or after the date with justification and up to 3 documents; pending declarations already count on the schedule; justification and documents stay private to the owner and admin."
  ]);
  v.innerHTML=h;
  if(admin){
    var mc=document.getElementById("cts-rule-maxc"), pw=document.getElementById("cts-rule-pwc"), tr=document.getElementById("cts-rule-tr");
    if(mc) mc.addEventListener("change",function(){ S.rules.maxConsecutive=Math.max(3,Math.min(10,+this.value||6)); save(); renderRules(); toast("Rule updated \u2014 adapt schedules from the Board banner"); });
    if(pw) pw.addEventListener("change",function(){ S.rules.postWeekendCap=Math.max(3,Math.min(7,+this.value||5)); save(); renderRules(); toast("Rule updated \u2014 adapt schedules from the Board banner"); });
    if(tr) tr.addEventListener("input",function(){ S.trainingRate=(+this.value)/100; document.getElementById("cts-rule-trv").textContent=this.value+"%"; });
    if(tr) tr.addEventListener("change",function(){ save(); });
  }
}

function renderAI(){
  var v=document.getElementById("cts-view-ai");
  var h='<div class="cts-chatlog" id="cts-chatlog">';
  if(!chat.length) h+='<div class="cts-empty">Ask anything about the board \u2014 e.g. \u201Cwho is most overloaded this month?\u201D, \u201Cwho never worked the weekend Mid shift?\u201D, \u201Cwhich position has the worst coverage?\u201D</div>';
  chat.forEach(function(m){
    h+='<div class="cts-msg cts-msg-'+m.role+'">'+esc(m.text)+'</div>';
  });
  h+='</div><div class="cts-askrow"><input id="cts-ask" placeholder="Ask about schedules, workload, skills, absences\u2026">'
   +'<button class="cts-btn cts-btn-primary" id="cts-askbtn">Ask</button></div>';
  if(admin){
    h+='<div class="cts-formrow" style="margin-top:14px"><input id="cts-aikey" type="password" placeholder="Anthropic API key (kept in THIS browser only)" style="flex:1;min-width:220px" value="'+esc(getAiKey())+'">'
     +'<button class="cts-btn" id="cts-savekey">Save key</button></div>';
  }
  h+='<div class="cts-note">The question is sent to the Claude API together with a compact snapshot of the board (team, skills, absences, current + recent archived schedules, requests). The API key never leaves this browser and is never included in the shared data or exports.</div>';
  v.innerHTML=h;
  var log=document.getElementById("cts-chatlog"); log.scrollTop=log.scrollHeight;
  function fire(){
    var inp=document.getElementById("cts-ask"); var q=inp.value.trim(); if(!q) return;
    inp.value="";
    chat.push({role:"q",text:q}); renderAI();
    askAI(q).then(function(a){ chat.push({role:"a",text:a}); renderAI(); })
    .catch(function(e){
      chat.push({role:"e",text:"AI unavailable: "+e.message+(getAiKey()?"":" \u2014 no API key configured (admin can set one below the ask box).")});
      renderAI();
    });
  }
  document.getElementById("cts-askbtn").addEventListener("click",fire);
  document.getElementById("cts-ask").addEventListener("keydown",function(ev){ if(ev.key==="Enter") fire(); });
  var sk=document.getElementById("cts-savekey");
  if(sk) sk.addEventListener("click",function(){
    setAiKey(document.getElementById("cts-aikey").value.trim()); toast("API key saved locally"); });
}

/* ---------- Data view ---------- */
function renderData(){
  var v=document.getElementById("cts-view-data");
  var h='<div class="cts-note" style="margin-bottom:10px">Rotation Board <span style="font-family:var(--cts-mono)">'+CTS_VERSION+'</span> \u00B7 shared list: <span style="font-family:var(--cts-mono)">'+SP_LIST+'</span></div>'
   +'<div class="cts-cardbox" style="margin-bottom:14px"><h3>Backup / restore (JSON)</h3>'
   +'<textarea class="cts-json" id="cts-jsonbox" spellcheck="false"></textarea>'
   +'<div class="cts-formrow"><button class="cts-btn" id="cts-export">Export current data</button>';
  if(admin) h+='<button class="cts-btn" id="cts-import">Import from box</button>'
   +'<button class="cts-btn cts-btn-danger" id="cts-reset">Reset everything</button>';
  h+='</div><div class="cts-note">When this page runs inside SharePoint, data is shared with the whole team through the <b>RotationBoardData</b> list (created automatically on first run). The header badge shows sync status; last write wins. The AI API key is never included.</div></div>';
  h+='<div class="cts-cardbox" style="margin-bottom:14px"><h3>Schedule export (upload-compatible)</h3>'
   +'<div class="cts-formrow"><select id="cts-expscope"><option value="week">Current week</option>'
   +'<option value="month">Month in view ('+esc(viewMonth)+')</option>'
   +'<option value="all">Everything (current + archive)</option></select>'
   +'<select id="cts-expfmt"><option value="json">JSON records</option><option value="csv">CSV (Excel)</option></select>'
   +'<button class="cts-btn cts-btn-primary" id="cts-expdl">Download file</button>'
   +'<button class="cts-btn" id="cts-expbox">To copy box</button></div>'
   +'<div class="cts-note">Both formats use the same layout as the \u201CImport past schedules\u201D box (date, task, employee, shift) \u2014 files exported here re-upload as-is, here or on any other Rotation Board. Use it to hand schedules to other teams or to keep monthly files in a document library.</div></div>';
  if(admin){
    h+='<div class="cts-cardbox" style="margin-bottom:14px"><h3>Import past schedules (years / months / days)</h3>'
     +'<textarea class="cts-json" id="cts-pastbox" spellcheck="false" placeholder=\'{"records":[{"date":"2025-11-03","task":"Payments desk","employee":"Employee A"},{"date":"2025-11-08","task":"Weekend coverage","employee":"Employee B","shift":"MID"}]}\'></textarea>'
     +'<div class="cts-formrow"><button class="cts-btn" id="cts-importpast">Import past schedules</button></div>'
     +'<div class="cts-note">Three formats accepted: (1) native archive entries exported from this app; (2) JSON records \u2014 one entry per assignment with date, task name and employee name (optional shift S1/S2/MID); (3) CSV with header <b>date,task,employee,shift</b> \u2014 exactly what the Schedule export produces. Names must match the Team and Positions tabs. Imports feed the rotation history (\u00D7n counters) and appear in the Board week selector and Month view.</div></div>';
    h+='<div class="cts-cardbox"><h3>Admin password</h3>'
     +'<div class="cts-formrow"><input type="password" id="cts-newpw" placeholder="New admin password" style="width:220px">'
     +'<button class="cts-btn" id="cts-setpw">Change password</button></div>'
     +'<div class="cts-note">This gate stops accidental edits by colleagues in consultation mode. It is client-side protection only \u2014 anyone with edit rights on the SharePoint list itself could still modify the raw data, so keep list permissions tight if that matters.</div></div>';
  }
  v.innerHTML=h;
  document.getElementById("cts-export").addEventListener("click",function(){
    document.getElementById("cts-jsonbox").value=JSON.stringify(S,null,2); toast("Exported to box \u2014 copy it");
  });
  function expPayload(){
    var scope=document.getElementById("cts-expscope").value;
    var fmt=document.getElementById("cts-expfmt").value;
    var recs=buildRecords(scope);
    if(!recs.length){ toast("Nothing to export for that scope"); return null; }
    var tag=scope==="week"?(S.schedule?S.schedule.weekStart:"week"):(scope==="month"?viewMonth:"all");
    return fmt==="csv"
      ? {name:"rotation-"+tag+".csv", text:toCSV(recs), mime:"text/csv"}
      : {name:"rotation-"+tag+".json", text:JSON.stringify({records:recs},null,2), mime:"application/json"};
  }
  document.getElementById("cts-expdl").addEventListener("click",function(){
    var p=expPayload(); if(p) downloadFile(p.name,p.text,p.mime);
  });
  document.getElementById("cts-expbox").addEventListener("click",function(){
    var p=expPayload(); if(p){ document.getElementById("cts-jsonbox").value=p.text; toast("Export placed in the copy box"); }
  });
  if(!admin) return;
  document.getElementById("cts-import").addEventListener("click",function(){
    try{
      var obj=JSON.parse(document.getElementById("cts-jsonbox").value);
      if(!obj.employees||!obj.tasks) throw new Error("bad shape");
      S=migrate(obj); save(); render(); toast("Data imported");
    }catch(e){ toast("Import failed \u2014 invalid JSON"); }
  });
  document.getElementById("cts-reset").addEventListener("click",function(){
    if(confirm("Reset all data? This clears employees, positions, absences, requests, archive and history.")){
      S=defaultState(); save(); render(); toast("Reset done"); }
  });
  document.getElementById("cts-importpast").addEventListener("click",function(){
    importPast(document.getElementById("cts-pastbox").value);
  });
  document.getElementById("cts-setpw").addEventListener("click",function(){
    var pw=document.getElementById("cts-newpw").value;
    if(pw.length<4){ toast("Use at least 4 characters"); return; }
    sha256(pw).then(function(hh){ S.adminHash=hh; save(); toast("Admin password updated"); });
  });
}

/* ---------- wiring ---------- */
document.getElementById("cts-adminToggle").addEventListener("click",function(){
  if(admin) lockAdmin(); else tryUnlockAdmin();
});
document.querySelectorAll("#cts-tabs .cts-tab").forEach(function(b){
  b.addEventListener("click",function(){ activeTab=this.getAttribute("data-cts-tab"); render(); });
});
render();
renderColabSlot();
spLoad();
})();
</script>
